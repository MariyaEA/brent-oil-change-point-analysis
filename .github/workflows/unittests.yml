name: Unit tests

on:
  push:
    branches: [main, task-1-foundation-eda, task-2-bayesian-change-point, task-3-dashboard]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas matplotlib statsmodels pytest

      - name: Run tests
        run: pytest
